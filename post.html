<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Detail - GitHub Blog</title>
    <style>
      :root {
        --primary-color: #2d3436;
        --secondary-color: #636e72;
        --accent-color: #0984e3;
        --background-color: #f5f6fa;
        --card-background: #ffffff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 0;
        background-color: var(--background-color);
        color: var(--primary-color);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        background: linear-gradient(135deg, var(--accent-color), #74b9ff);
        color: white;
        padding: 2rem 0;
        margin-bottom: 2rem;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        color: white;
        text-decoration: none;
        font-weight: 500;
        margin-bottom: 1rem;
        transition: opacity 0.3s ease;
      }

      .back-link:hover {
        opacity: 0.8;
      }

      .back-link::before {
        content: "←";
        margin-right: 0.5rem;
      }

      .post {
        background: var(--card-background);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .post-title {
        margin: 0 0 1rem 0;
        color: var(--primary-color);
        font-size: 2.5rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .post-date {
        color: var(--secondary-color);
        font-size: 1rem;
        margin-bottom: 2rem;
      }

      .post-content {
        font-size: 1.1rem;
        line-height: 1.8;
        color: var(--primary-color);
        white-space: pre-line;
      }

      .post-content p {
        margin-bottom: 1.5rem;
      }

      .image-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
      }

      .gallery-image {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .gallery-image:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
      }

      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        .post {
          padding: 1.5rem;
        }

        .post-title {
          font-size: 2rem;
        }

        .image-gallery {
          grid-template-columns: 1fr;
        }
      }
      .image-in-post {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .comments-section {
        margin-top: 2rem;
        background: var(--card-background);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .comments-heading {
        margin: 0 0 1rem 0;
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--primary-color);
      }

      .comments-warning {
        color: #c0392b;
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }

      .comments-list {
        margin-bottom: 1.5rem;
      }

      .comment-item {
        border-bottom: 1px solid #eee;
        padding: 1rem 0;
      }

      .comment-item:last-child {
        border-bottom: none;
      }

      .comment-meta {
        font-size: 0.85rem;
        color: var(--secondary-color);
        margin-bottom: 0.35rem;
      }

      .comment-body {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .comment-form label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 0.35rem;
        color: var(--primary-color);
      }

      .comment-form input,
      .comment-form textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font: inherit;
        margin-bottom: 1rem;
      }

      .comment-form textarea {
        min-height: 120px;
        resize: vertical;
      }

      .comment-form button {
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 0.65rem 1.25rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      .comment-form button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .comments-empty {
        color: var(--secondary-color);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <a href="./" class="back-link">Back to Posts</a>
      </div>
    </header>
    <div class="container">
      <article id="post-content" class="post"></article>
      <section id="comments-section" class="comments-section" hidden>
        <h2 class="comments-heading">Comments</h2>
        <p id="comments-warning" class="comments-warning" hidden></p>
        <div id="comments-list" class="comments-list"></div>
        <p id="comments-empty" class="comments-empty" hidden>
          No comments yet.
        </p>
        <form id="comment-form" class="comment-form" autocomplete="on">
          <label for="comment-author">Name</label>
          <input
            id="comment-author"
            name="author"
            type="text"
            maxlength="80"
            required
          />
          <label for="comment-body">Comment</label>
          <textarea id="comment-body" name="body" maxlength="4000" required></textarea>
          <button type="submit" id="comment-submit">Submit</button>
        </form>
      </section>
    </div>
    <script src="./utills.js"></script>
    <script>
      (function resolveCommentApiBase() {
        const PLACEHOLDER = "__COMMENT_API_BASE__";
        let raw = PLACEHOLDER.trim().replace(/\/$/, "");
        if (!raw || raw === PLACEHOLDER) {
          raw = "";
        }
        if (raw) {
          window.__COMMENT_API_BASE__ = raw;
          return;
        }
        try {
          const h = window.location.hostname;
          if (h === "localhost" || h === "127.0.0.1") {
            window.__COMMENT_API_BASE__ = "http://localhost:5000";
            return;
          }
        } catch (e) {}
        window.__COMMENT_API_BASE__ = "";
      })();
      const COMMENT_API_BASE = window.__COMMENT_API_BASE__ || "";

      function postIdForApi(raw) {
        if (!raw) return null;
        return raw.replace(/\.json$/i, "").trim();
      }

      function commentsEndpoint(uuid) {
        if (!COMMENT_API_BASE || !uuid) return null;
        return (
          COMMENT_API_BASE +
          "/api/posts/" +
          encodeURIComponent(uuid) +
          "/comments"
        );
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      async function loadComments(uuid) {
        const url = commentsEndpoint(uuid);
        const section = document.getElementById("comments-section");
        const warn = document.getElementById("comments-warning");
        const listEl = document.getElementById("comments-list");
        const emptyEl = document.getElementById("comments-empty");
        const form = document.getElementById("comment-form");

        if (!url) {
          warn.hidden = false;
          warn.textContent =
            "댓글 API 주소가 없습니다. 에디터 server/.env에 COMMENT_API_BASE=https://(배포한 API 주소) 를 넣고 서버를 재시작해 post.html이 블로그 리포에 다시 올라가게 하세요. GitHub Pages만 쓰는 경우 로컬 서버(localhost:5000)로는 브라우저에서 접근할 수 없습니다. " +
            "COMMENT_API_BASE is missing. Add it to server/.env, restart the editor server (templates sync to the blog repo). For GitHub Pages you need a publicly reachable API URL.";
          if (form) form.querySelectorAll("input, textarea, button").forEach((el) => {
            el.disabled = true;
          });
          section.hidden = false;
          return;
        }

        warn.hidden = true;
        const res = await fetch(url);
        const json = await res.json();
        const items = json.success && Array.isArray(json.data) ? json.data : [];
        listEl.innerHTML = "";
        emptyEl.hidden = items.length > 0;
        items.forEach((c) => {
          const div = document.createElement("div");
          div.className = "comment-item";
          const dateStr = c.createdAt
            ? new Date(c.createdAt).toLocaleString()
            : "";
          div.innerHTML =
            '<div class="comment-meta">' +
            escapeHtml(c.author || "") +
            " · " +
            escapeHtml(dateStr) +
            "</div>" +
            '<div class="comment-body">' +
            escapeHtml(c.body || "") +
            "</div>";
          listEl.appendChild(div);
        });
        section.hidden = false;
      }

      async function loadPost() {
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const postId = urlParams.get("id");

          if (!postId) {
            throw new Error("Post ID not found");
          }

          const response = await fetch(`./posts/${postId}?time=${Date.now()}`);
          const post = await response.json();

          document.title = post.title;

          const postContent = document.getElementById("post-content");

          postContent.innerHTML = `
            <h1 class="post-title">${post.title}</h1>
            <div class="post-date">${new Date(
              post.createdAt
            ).toLocaleDateString()}</div>
          `;

          // 첨부 파일 갤러리 (기존 files)
          if (post.files && post.files.length > 0) {
            const gallery = document.createElement("div");
            gallery.className = "image-gallery";

            post.files.forEach((file) => {
              const img = document.createElement("img");
              img.src = `./images/${file.name}`;
              img.alt = file.name;
              img.className = "gallery-image";
              gallery.appendChild(img);
            });

            postContent.appendChild(gallery);
          }

          // 콘텐츠 렌더링 (UUID 태그를 실제 미디어로 변환)
          const content = document.createElement("div");
          content.className = "post-content";

          // UUID 태그를 실제 미디어로 변환
          let processedContent = post.content;

          console.log("processedContent", processedContent);
          // contentFiles가 있으면 UUID를 실제 파일 경로로 매핑
          if (post.contentFiles && post.contentFiles.length > 0) {
            const uuidToFileMap = {};
            post.contentFiles.forEach((file) => {
              if (file.uuid) {
                uuidToFileMap[file.uuid] = file;
              }
            });

            // img 태그 변환
            processedContent = addClassToImages(
              processedContent,
              "image-in-post"
            );

            // video 태그 변환
            processedContent = processedContent.replace(
              /<video src="([^"]+)"/g,
              (match, uuid) => {
                const file = uuidToFileMap[uuid];
                if (file && file.name) {
                  return `<video src="./images/${file.name}" controls style="max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0;">`;
                }
                return match; // 매핑되지 않은 경우 원본 유지
              }
            );
          }

          processedContent = processedContent.replace(
            /<youtube src="([^"]+)"[^>]*>/g,
            (match, youtubeVideoUrl) => {
              console.log("youtubeVideoUrl", youtubeVideoUrl);
              console.log("match", match);
              return `<iframe src="${youtubeVideoUrl}" frameborder="0" allowfullscreen title="${youtubeVideoUrl}" width="100%" height="500px"></iframe>`;
            }
          );

          content.innerHTML = processedContent.replace(/\n/g, "<br>");
          console.log("processedContent", processedContent);
          postContent.appendChild(content);

          const uuid = postIdForApi(postId);
          await loadComments(uuid);

          const form = document.getElementById("comment-form");
          const submitBtn = document.getElementById("comment-submit");
          const postUrl = commentsEndpoint(uuid);
          if (form && postUrl) {
            form.onsubmit = async (e) => {
              e.preventDefault();
              const author = document.getElementById("comment-author").value;
              const body = document.getElementById("comment-body").value;
              submitBtn.disabled = true;
              try {
                const r = await fetch(postUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ author, body }),
                });
                const out = await r.json();
                if (!r.ok || !out.success) {
                  throw new Error(out.error || "Failed to post comment");
                }
                document.getElementById("comment-body").value = "";
                await loadComments(uuid);
              } catch (err) {
                console.error(err);
                alert(err.message || "Failed to submit comment");
              } finally {
                submitBtn.disabled = false;
              }
            };
          }
        } catch (error) {
          console.error("Error loading post:", error);
          document.getElementById("post-content").innerHTML = `
            <h1>Error</h1>
            <p>Failed to load post. Please try again later.</p>
          `;
        }
      }

      window.addEventListener("load", loadPost);
    </script>
  </body>
</html>
